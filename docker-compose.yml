services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./apps/api/.env
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'

  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - '1025:1025' # SMTP port
      - '8025:8025' # Web UI port

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - redis
      - mailhog
    ports:
      - '5000:8080'
    volumes:
      - ./apps/api/wwwroot/uploads:/app/wwwroot/uploads

  # web:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #   restart: always
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:5000
  #     - BACKEND_API_URL=http://api:8080/api
  #   depends_on:
  #     - api
  #   ports:
  #     - '3000:3000'

volumes:
  pgdata:
